{% assign field = include.field | default: 'algorithms' %}
<svg class="notebook-shape" viewBox="0 0 120 140" fill="none" xmlns="http://www.w3.org/2000/svg">
  {% case field %}
    {% when 'algorithms' %}
      <circle cx="60" cy="30" r="14" fill="url(#g1)" opacity="0.9"/>
      <circle cx="30" cy="75" r="10" fill="url(#g2)" opacity="0.8"/>
      <circle cx="90" cy="75" r="10" fill="url(#g3)" opacity="0.8"/>
      <circle cx="60" cy="115" r="12" fill="url(#g4)" opacity="0.9"/>
      <line x1="60" y1="44" x2="30" y2="65" stroke="url(#g1)" stroke-width="2" opacity="0.4"/>
      <line x1="60" y1="44" x2="90" y2="65" stroke="url(#g2)" stroke-width="2" opacity="0.4"/>
      <line x1="35" y1="84" x2="55" y2="104" stroke="url(#g3)" stroke-width="2" opacity="0.4"/>
      <line x1="85" y1="84" x2="65" y2="104" stroke="url(#g4)" stroke-width="2" opacity="0.4"/>
      <line x1="30" y1="75" x2="90" y2="75" stroke="url(#g1)" stroke-width="1.5" opacity="0.2" stroke-dasharray="3 3"/>

    {% when 'data-structures' %}
      <rect x="45" y="20" width="30" height="20" rx="4" fill="url(#g1)" opacity="0.9"/>
      <rect x="15" y="65" width="30" height="20" rx="4" fill="url(#g2)" opacity="0.8"/>
      <rect x="75" y="65" width="30" height="20" rx="4" fill="url(#g3)" opacity="0.8"/>
      <rect x="45" y="105" width="30" height="20" rx="4" fill="url(#g4)" opacity="0.9"/>
      <line x1="60" y1="40" x2="30" y2="65" stroke="url(#g1)" stroke-width="2" opacity="0.5"/>
      <line x1="60" y1="40" x2="90" y2="65" stroke="url(#g2)" stroke-width="2" opacity="0.5"/>
      <line x1="30" y1="85" x2="55" y2="105" stroke="url(#g3)" stroke-width="2" opacity="0.5"/>
      <line x1="90" y1="85" x2="65" y2="105" stroke="url(#g4)" stroke-width="2" opacity="0.5"/>

    {% when 'ai-ml' %}
      <circle cx="30" cy="30" r="8" fill="url(#g1)" opacity="0.7"/>
      <circle cx="60" cy="20" r="8" fill="url(#g2)" opacity="0.7"/>
      <circle cx="90" cy="30" r="8" fill="url(#g3)" opacity="0.7"/>
      <circle cx="30" cy="70" r="8" fill="url(#g2)" opacity="0.7"/>
      <circle cx="60" cy="75" r="8" fill="url(#g1)" opacity="0.7"/>
      <circle cx="90" cy="70" r="8" fill="url(#g4)" opacity="0.7"/>
      <circle cx="45" cy="115" r="8" fill="url(#g3)" opacity="0.7"/>
      <circle cx="75" cy="115" r="8" fill="url(#g1)" opacity="0.7"/>
      <line x1="35" y1="37" x2="25" y2="62" stroke="url(#g1)" stroke-width="1.5" opacity="0.3"/>
      <line x1="60" y1="28" x2="60" y2="67" stroke="url(#g2)" stroke-width="1.5" opacity="0.3"/>
      <line x1="85" y1="37" x2="95" y2="62" stroke="url(#g3)" stroke-width="1.5" opacity="0.3"/>
      <line x1="35" y1="78" x2="50" y2="108" stroke="url(#g2)" stroke-width="1.5" opacity="0.3"/>
      <line x1="85" y1="78" x2="70" y2="108" stroke="url(#g4)" stroke-width="1.5" opacity="0.3"/>

    {% when 'security' %}
      <path d="M60 15 L95 35 L95 65 C95 95 60 125 60 125 C60 125 25 95 25 65 L25 35 Z" fill="url(#g1)" opacity="0.8"/>
      <circle cx="60" cy="65" r="20" fill="none" stroke="url(#g2)" stroke-width="2" opacity="0.6"/>
      <circle cx="60" cy="65" r="10" fill="url(#g3)" opacity="0.6"/>
      <path d="M50 65 L58 72 L70 58" stroke="url(#g4)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" opacity="0.8"/>

    {% when 'web' %}
      <circle cx="60" cy="60" r="45" fill="none" stroke="url(#g1)" stroke-width="1.5" opacity="0.3"/>
      <ellipse cx="60" cy="60" rx="20" ry="45" fill="none" stroke="url(#g2)" stroke-width="1.5" opacity="0.3"/>
      <line x1="15" y1="60" x2="105" y2="60" stroke="url(#g3)" stroke-width="1.5" opacity="0.3"/>
      <circle cx="60" cy="30" r="6" fill="url(#g1)" opacity="0.8"/>
      <circle cx="35" cy="50" r="5" fill="url(#g2)" opacity="0.7"/>
      <circle cx="85" cy="50" r="5" fill="url(#g3)" opacity="0.7"/>
      <circle cx="60" cy="85" r="6" fill="url(#g4)" opacity="0.8"/>

    {% when 'systems' %}
      <rect x="20" y="15" width="80" height="25" rx="5" fill="url(#g1)" opacity="0.85"/>
      <rect x="20" y="55" width="80" height="25" rx="5" fill="url(#g2)" opacity="0.75"/>
      <rect x="20" y="95" width="80" height="25" rx="5" fill="url(#g4)" opacity="0.85"/>
      <line x1="60" y1="40" x2="60" y2="55" stroke="url(#g3)" stroke-width="2" opacity="0.5"/>
      <line x1="60" y1="80" x2="60" y2="95" stroke="url(#g3)" stroke-width="2" opacity="0.5"/>
      <circle cx="60" cy="48" r="3" fill="url(#g3)" opacity="0.6"/>
      <circle cx="60" cy="88" r="3" fill="url(#g3)" opacity="0.6"/>

    {% else %}
      <circle cx="60" cy="30" r="14" fill="url(#g1)" opacity="0.9"/>
      <circle cx="30" cy="75" r="10" fill="url(#g2)" opacity="0.8"/>
      <circle cx="90" cy="75" r="10" fill="url(#g3)" opacity="0.8"/>
      <circle cx="60" cy="115" r="12" fill="url(#g4)" opacity="0.9"/>
      <line x1="60" y1="44" x2="30" y2="65" stroke="url(#g1)" stroke-width="2" opacity="0.4"/>
      <line x1="60" y1="44" x2="90" y2="65" stroke="url(#g2)" stroke-width="2" opacity="0.4"/>
      <line x1="35" y1="84" x2="55" y2="104" stroke="url(#g3)" stroke-width="2" opacity="0.4"/>
      <line x1="85" y1="84" x2="65" y2="104" stroke="url(#g4)" stroke-width="2" opacity="0.4"/>
      <line x1="30" y1="75" x2="90" y2="75" stroke="url(#g1)" stroke-width="1.5" opacity="0.2" stroke-dasharray="3 3"/>

  {% endcase %}
  <defs>
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#6366f1"/>
      <stop offset="1" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="g2" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#06b6d4"/>
      <stop offset="1" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="g3" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#f59e0b"/>
      <stop offset="1" stop-color="#ef4444"/>
    </linearGradient>
    <linearGradient id="g4" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#10b981"/>
      <stop offset="1" stop-color="#06b6d4"/>
    </linearGradient>
  </defs>
</svg>
