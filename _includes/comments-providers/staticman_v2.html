{% assign locale = include.locale | default: site.locale %}
{% if site.repository and site.comments.staticman.branch %}
  <script>
    (function ($) {
    $('#new_comment').submit(function () {
      var form = this;
      var loadingLabel = {{ site.data.ui-text[locale].loading_label | default: "Loading..." | jsonify }};
      var submittedLabel = {{ site.data.ui-text[locale].comment_btn_submitted | default: "Submitted" | jsonify }};
      var submitLabel = {{ site.data.ui-text[locale].comment_btn_submit | default: "Submit Comment" | jsonify }};

      $(form).addClass('disabled');
      $('#comment-form-submit').html('<i data-lucide="loader-circle" class="icon icon--spin"></i> ' + loadingLabel);

      $.ajax({
        type: $(this).attr('method'),
        url: $(this).attr('action'),
        data: $(this).serialize(),
        contentType: 'application/x-www-form-urlencoded',
        success: function (data) {
          $('#comment-form-submit').html(submittedLabel);
          $('.page__comments-form .js-notice').removeClass('notice--danger');
          $('.page__comments-form .js-notice').addClass('notice--success');
          showAlert('{{ site.data.ui-text[locale].comment_success_msg | default: "Thanks for your comment! It will show on the site once it has been approved." }}');
        },
        error: function (err) {
          console.log(err);
          $('#comment-form-submit').html(submitLabel);
          $('.page__comments-form .js-notice').removeClass('notice--success');
          $('.page__comments-form .js-notice').addClass('notice--danger');
          showAlert('{{ site.data.ui-text[locale].comment_error_msg | default: "Sorry, there was an error with your submission. Please make sure all required fields have been completed and try again." }}');
          $(form).removeClass('disabled');
        }
      });

      return false;
    });

    function showAlert(message) {
      $('.page__comments-form .js-notice').removeClass('hidden');
      $('.page__comments-form .js-notice-text').html(message);
    }
  })(jQuery);
  </script>
{% endif %}
